<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Formulare HTML</title>
    </head>
    <body>
        <form action="" method="get">
            <!- - text- - >
            <input type="text" placeholder="Introdu numele" required minlength="6" maxlength="1333" />
            <br />
            <br />
            <input type="text" placeholder="Introdu prenume" required minlength="6" maxlength="1333" pattern="[A-Za-z]"/>
            <br>
            <br>
            <!- -parola - - >
            <input type="password" placeholder="parola" />
            <br />
            <br />
            <input type="email" placeholder="email" />
            <br />
            <br />
            <input
                type="number"
                placeholder="salariu"
                pattern="[0-9]{10}"
                min="10000"
                max="100000"
            />
            <br />
            <br />
            <label for="nume">Data nasterii</label>
            <input type="date" id="nume" />
            <br />
            <br />
            <label>Limbajul preferat</label>
            <input type="checkbox" />HTML <input type="checkbox" />CSS
            <input type="checkbox" />JS
            <br />
            <br />
            <input type="radio" name="gen" checked="True" />Masculin
            <input type="radio" name="gen" />Femenin
            <br />
            <br />
            <select>
                <option value="md">Repuvblica Moldova</option>
                <option>Romania</option>
                <option>Ucraina</option>
            </select>
            <br>
            <br>
            <input type="file" />
            <!--label---->
            <textarea row="4" cols="75"></textarea>
            <br />
            <br />

            <button type="submit">Trimite</button>
            <button type="reset">Reset</button>
        </form>
    </body>
</html>
