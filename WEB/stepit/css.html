<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS</title>
    <style>
        h1{
            text-align:center;
            color:blue;
            font-size:40px;
            text-shadow:2px 2px 5px gray;
        }
        p{
            color:gray;
            font-size: 20px;
            text-align: justify;
            line-height:10px;
        }
        body{
            background-color: lightblue;
        }


    </style>
</head>
<body>
    <header>
    <h1>Cariera</h1>
    </header>
    <br>
        <section>
        <form action="" method="post">
        <p><b>Identitatea</b></p>
        <input type="text" placeholder="Introdu Nume" required minlength="6" maxlength="1333" pattern="[A-Za-z]"/>
        <br>
        <br>
        <input type="text" placeholder="Introdu Nume" required minlength="9" [0-9]"/>
        <br>
        <br>
        <input type="text" placeholder="numar de telefon" required minlength="6" maxlength="1333" pattern="[A-Za-z]"/>
        <br>
        <br>
        <input type="email" placeholder="email" required/>
        <br>
        <br>
        <label for="gen"><b>Gen</b></label>
        <input type="radio" name="gen" id="masculin" />Masculin
        <input type="radio" name="gen" id="feminin" />Feminin
        <br>
        <br>
        <label for="nume"><b>Data nasterii</b></label>
        <input type="date" id="nume" />
        <br>
        <br>
        <label for="oras"><b>Orașul</b></label>
        <select id="oras" name="oras">
            <option value="">Alege orașul</option>
            <option value="chisinau">Chișinău</option>
            <option value="balti">Bălți</option>
            <option value="cahul">Cahul</option>
        </select>
        <br>
        <label for="text"><b>Spunene cateva lucruri despre tine</b></label>
        <textarea rows="4" cols="75" id="text"></textarea>
        <br>
        <br>
        <label for="program"><b>Program preferat</b></label><br>
        <select id="program" name="program">
        <option value="full">Full-time</option>
        <option value="part">Part-time</option>
        <option value="weekend">Doar weekend</option>
        </select>
        <br>
        <br>
        <label for="file"><b>Trimite CV</b></label>
        <input type="file" id="file">
        <br>
        <br>
    <input type="submit" value="Trimite"/>
    </form>
        <br>
        <br>
        <img src="andys.jpg" alt="Descrire imagine" width="450" height="350">
        </section>

    <footer>
        <p><strong>Andys Pizza</strong></p>
        <p>Pentru mai multe detalii</p>
        <a href='https://www.andys.md/'>Situl principal</a>
    </footer>
</body>
</html>
